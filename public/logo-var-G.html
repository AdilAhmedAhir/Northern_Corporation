<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Variation G — Logo Becomes The N</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060a06;
    color: #F5F0E1;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
  }

  /* ========== LOGO ========== */
  .logo-morph {
    position: absolute;
    width: 280px;
    height: 280px;
    object-fit: contain;
    z-index: 10;
    opacity: 0;
    /* Cream color filter to match #F5F0E1 */
    filter: brightness(0) invert(0.94) sepia(0.15) saturate(1.5) hue-rotate(5deg);
    animation: logoEnter 1.0s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
  }
  @keyframes logoEnter {
    0%   { opacity: 0; transform: scale(0.5); }
    60%  { opacity: 0.95; transform: scale(1.06); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* Background ghost watermark — logo scales up and fades behind text */
  .logo-ghost {
    position: absolute;
    width: 280px;
    height: 280px;
    object-fit: contain;
    z-index: 1;
    opacity: 0;
    filter: brightness(0) invert(0.94) sepia(0.15) saturate(1.5) hue-rotate(5deg);
    pointer-events: none;
  }
  @keyframes ghostExpand {
    0%   { opacity: 0.7; transform: scale(1); }
    100% { opacity: 0.04; transform: scale(2.2); }
  }

  /* Gold lock flash */
  .lock-flash {
    position: absolute;
    width: 0; height: 0;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,175,55,0.25) 0%, rgba(212,175,55,0.08) 40%, transparent 70%);
    z-index: 9; pointer-events: none; opacity: 0;
  }
  .lock-flash.active {
    animation: lockRing 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  @keyframes lockRing {
    0%   { width: 30px; height: 30px; opacity: 0.9; }
    100% { width: 350px; height: 350px; opacity: 0; }
  }

  /* ========== LETTERS ========== */
  .content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
  }

  .letters {
    display: flex; align-items: baseline; justify-content: center;
    font-family: 'Playfair Display', Georgia, serif;
    position: relative;
  }

  .letter-wrap { overflow: visible; display: inline-block; }
  .letter {
    font-size: 11vw; font-weight: 900; line-height: 0.9;
    letter-spacing: -0.02em; color: #F5F0E1; display: block;
    opacity: 0;
    /* JS will animate these from logo center to final position */
  }

  /* N placeholder — invisible, logo takes this slot */
  .letter-wrap.is-logo .letter { visibility: hidden; }
  .letter-wrap.is-logo { position: relative; }

  .subtitle-wrap { overflow: hidden; margin-top: 0.5rem; }
  .subtitle {
    font-size: 1.1vw; font-weight: 300; text-transform: uppercase;
    letter-spacing: 0.7em; color: rgba(191,163,80,0.45);
    transform: translateY(100%); opacity: 0;
    animation: slideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 3.0s forwards;
  }
  @keyframes slideUp { to { transform: translateY(0); opacity: 1; } }

  /* Decorative corners */
  .corner {
    position: fixed;
    width: 40px; height: 40px;
    border-color: rgba(191,163,80,0.12);
    border-style: solid; z-index: 4; opacity: 0;
    animation: fadeIn 0.8s 2.8s forwards;
  }
  .corner-tl { top: 32px; left: 32px; border-width: 1px 0 0 1px; }
  .corner-tr { top: 32px; right: 32px; border-width: 1px 1px 0 0; }
  .corner-bl { bottom: 32px; left: 32px; border-width: 0 0 1px 1px; }
  .corner-br { bottom: 32px; right: 32px; border-width: 0 1px 1px 0; }

  /* Ambient glow */
  .glow {
    position: absolute; width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(191,163,80,0.1) 0%, transparent 60%);
    opacity: 0; animation: fadeIn 1.5s 0.3s forwards; z-index: 0;
  }

  /* Bottom bar */
  .bottom-bar { position: absolute; bottom: 48px; left: 48px; right: 48px; z-index: 2; }
  .est {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.3em;
    color: rgba(245,240,225,0.2); margin-bottom: 12px;
    opacity: 0; animation: fadeIn 0.6s 2.8s forwards;
  }
  .progress-track {
    position: relative; height: 1px; width: 100%;
    background: rgba(255,255,255,0.05); overflow: hidden; border-radius: 1px;
  }
  .progress-fill {
    position: absolute; top: 0; left: 0; height: 100%; width: 0%;
    background: linear-gradient(90deg, #BFA350 0%, #D4AF37 60%, rgba(212,175,55,0.3) 100%);
    animation: fillBar 3.8s cubic-bezier(0.33, 0, 0.2, 1) forwards;
  }
  .progress-glow {
    position: absolute; top: -2px; height: 5px; width: 40px; border-radius: 10px;
    background: radial-gradient(ellipse, rgba(212,175,55,0.6) 0%, transparent 70%);
    animation: glowMove 3.8s cubic-bezier(0.33, 0, 0.2, 1) forwards;
  }
  .pct {
    text-align: right; margin-top: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.15em; color: rgba(245,240,225,0.25);
    font-variant-numeric: tabular-nums;
    opacity: 0; animation: fadeIn 0.4s 0.3s forwards;
  }

  .grain {
    position: absolute; inset: 0; pointer-events: none; opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px; z-index: 10;
  }

  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes fillBar { to { width: 100%; } }
  @keyframes glowMove { to { left: calc(100% - 40px); } }

  .replay {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    background: rgba(191,163,80,0.15); border: 1px solid rgba(191,163,80,0.3);
    color: rgba(245,240,225,0.6); font-family: 'Inter'; font-size: 12px;
    letter-spacing: 0.1em; padding: 8px 16px; border-radius: 6px;
    cursor: pointer; transition: all 0.3s;
  }
  .replay:hover { background: rgba(191,163,80,0.25); color: #F5F0E1; }
  .label {
    position: fixed; top: 20px; left: 20px; z-index: 100;
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(191,163,80,0.4);
  }
  .desc {
    position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); z-index: 100;
    font-size: 11px; letter-spacing: 0.05em; color: rgba(245,240,225,0.2); white-space: nowrap;
  }
</style>
</head>
<body>
  <span class="label">Var G — Logo Becomes The N</span>
  <button class="replay" onclick="location.reload()">↻ Replay</button>
  <span class="desc">Logo appears center → letters emerge from within the logo → logo morphs into the "N" — the brand IS the letter</span>
  <div class="grain"></div>
  <div class="glow"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <img src="/logo-symbol.svg" alt="" class="logo-morph" id="logoMorph" />
  <img src="/logo-symbol.svg" alt="" class="logo-ghost" id="logoGhost" />
  <div class="lock-flash" id="lockFlash"></div>

  <div class="content">
    <div class="letters" id="lettersRow">
      <div class="letter-wrap is-logo" id="nSlot"><span class="letter">N</span></div>
      <div class="letter-wrap"><span class="letter">O</span></div>
      <div class="letter-wrap"><span class="letter">R</span></div>
      <div class="letter-wrap"><span class="letter">T</span></div>
      <div class="letter-wrap"><span class="letter">H</span></div>
      <div class="letter-wrap"><span class="letter">E</span></div>
      <div class="letter-wrap"><span class="letter">R</span></div>
      <div class="letter-wrap"><span class="letter">N</span></div>
    </div>
    <div class="subtitle-wrap">
      <p class="subtitle">Corporation Limited</p>
    </div>
  </div>

  <div class="bottom-bar">
    <p class="est">Est. 1967</p>
    <div class="progress-track">
      <div class="progress-fill"></div>
      <div class="progress-glow"></div>
    </div>
    <div class="pct" id="pct">0%</div>
  </div>

  <script>
    // =============================================
    // WEB AUDIO — CINEMATIC SOUND DESIGN v2
    // Richer, deeper, more layered — zero downloads
    // =============================================
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
      if (!audioCtx) audioCtx = new AudioCtx();
    }

    // Create simple convolution reverb impulse
    function createReverb(duration = 1.5, decay = 2) {
      initAudio();
      const rate = audioCtx.sampleRate;
      const len = rate * duration;
      const impulse = audioCtx.createBuffer(2, len, rate);
      for (let ch = 0; ch < 2; ch++) {
        const data = impulse.getChannelData(ch);
        for (let i = 0; i < len; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
        }
      }
      const conv = audioCtx.createConvolver();
      conv.buffer = impulse;
      return conv;
    }

    // CINEMATIC IMPACT — logo entrance
    function playImpact() {
      initAudio();
      const ctx = audioCtx;
      const now = ctx.currentTime;
      const reverb = createReverb(2.0, 2.5);
      const masterGain = ctx.createGain();
      masterGain.gain.value = 0.7;
      reverb.connect(masterGain);
      masterGain.connect(ctx.destination);

      // Layer 1: Sub bass hit (30-20Hz)
      const sub = ctx.createOscillator();
      const subGain = ctx.createGain();
      sub.type = 'sine';
      sub.frequency.setValueAtTime(50, now);
      sub.frequency.exponentialRampToValueAtTime(20, now + 1.2);
      subGain.gain.setValueAtTime(0.4, now);
      subGain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
      sub.connect(subGain);
      subGain.connect(reverb);
      subGain.connect(ctx.destination);
      sub.start(now); sub.stop(now + 1.2);

      // Layer 2: Mid-frequency thud (150Hz)
      const mid = ctx.createOscillator();
      const midGain = ctx.createGain();
      mid.type = 'triangle';
      mid.frequency.setValueAtTime(150, now);
      mid.frequency.exponentialRampToValueAtTime(60, now + 0.4);
      midGain.gain.setValueAtTime(0.15, now);
      midGain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      mid.connect(midGain);
      midGain.connect(reverb);
      mid.start(now); mid.stop(now + 0.5);

      // Layer 3: Textured noise burst
      const bufLen = ctx.sampleRate * 0.3;
      const noiseBuf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
      const noiseData = noiseBuf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) {
        noiseData[i] = (Math.random() * 2 - 1) * 0.3;
      }
      const noise = ctx.createBufferSource();
      noise.buffer = noiseBuf;
      const nFilter = ctx.createBiquadFilter();
      nFilter.type = 'lowpass'; nFilter.frequency.value = 500;
      const nGain = ctx.createGain();
      nGain.gain.setValueAtTime(0.08, now);
      nGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      noise.connect(nFilter); nFilter.connect(nGain);
      nGain.connect(reverb);
      noise.start(now);
    }

    // WHOOSH — letters emerge
    function playWhoosh() {
      initAudio();
      const ctx = audioCtx;
      const now = ctx.currentTime;

      const bufLen = ctx.sampleRate * 0.8;
      const noiseBuf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
      const data = noiseBuf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
      const noise = ctx.createBufferSource();
      noise.buffer = noiseBuf;

      const filter = ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.Q.value = 3;
      filter.frequency.setValueAtTime(150, now);
      filter.frequency.exponentialRampToValueAtTime(3000, now + 0.2);
      filter.frequency.exponentialRampToValueAtTime(600, now + 0.7);

      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.15, now + 0.06);
      gain.gain.setValueAtTime(0.15, now + 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.7);

      const reverb = createReverb(1.0, 3);
      noise.connect(filter); filter.connect(gain);
      gain.connect(reverb); reverb.connect(ctx.destination);
      gain.connect(ctx.destination);
      noise.start(now);
    }

    // CRYSTALLINE CHIME — logo locks into N
    function playChime() {
      initAudio();
      const ctx = audioCtx;
      const now = ctx.currentTime;
      const reverb = createReverb(2.5, 1.8);
      const masterGain = ctx.createGain();
      masterGain.gain.value = 0.5;
      reverb.connect(masterGain);
      masterGain.connect(ctx.destination);

      // Musical harmonics: C5, E5, G5, C6 — major chord shimmer
      const freqs = [523.25, 659.25, 783.99, 1046.50];
      const volumes = [0.06, 0.04, 0.035, 0.02];
      freqs.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(volumes[i], now + i * 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 2.0);
        osc.connect(gain);
        gain.connect(reverb);
        gain.connect(ctx.destination);
        osc.start(now + i * 0.03);
        osc.stop(now + 2.0);
      });

      // Soft shimmer noise layer
      const shimLen = ctx.sampleRate * 0.15;
      const shimBuf = ctx.createBuffer(1, shimLen, ctx.sampleRate);
      const shimData = shimBuf.getChannelData(0);
      for (let i = 0; i < shimLen; i++) shimData[i] = Math.random() * 2 - 1;
      const shim = ctx.createBufferSource();
      shim.buffer = shimBuf;
      const shimFilter = ctx.createBiquadFilter();
      shimFilter.type = 'highpass'; shimFilter.frequency.value = 6000;
      const shimGain = ctx.createGain();
      shimGain.gain.setValueAtTime(0.02, now);
      shimGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      shim.connect(shimFilter); shimFilter.connect(shimGain);
      shimGain.connect(reverb);
      shim.start(now);
    }

    // SOFT TONAL SETTLE — final resolve
    function playSettle() {
      initAudio();
      const ctx = audioCtx;
      const now = ctx.currentTime;
      // Soft low tone that signals "complete"
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 110; // A2 — warm, grounding
      gain.gain.setValueAtTime(0.04, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(now); osc.stop(now + 1.5);
    }

    // =============================================
    // PERCENTAGE COUNTER
    // =============================================
    const pctEl = document.getElementById('pct');
    let pctStart = null; const pctDuration = 3800;
    function tickPct(ts) {
      if (!pctStart) pctStart = ts;
      const t = Math.min((ts - pctStart) / pctDuration, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      pctEl.textContent = Math.round(eased * 100) + '%';
      if (eased >= 1) pctEl.style.color = 'rgba(191,163,80,0.8)';
      if (t < 1) requestAnimationFrame(tickPct);
    }
    requestAnimationFrame(tickPct);

    // =============================================
    // ANIMATION: Logo center → letters EMERGE from logo → logo morphs to N
    // =============================================
    const logo = document.getElementById('logoMorph');
    const logoGhost = document.getElementById('logoGhost');
    const nSlot = document.getElementById('nSlot');
    const lockFlash = document.getElementById('lockFlash');
    const letterWraps = document.querySelectorAll('.letter-wrap:not(.is-logo)');

    // Sound: cinematic impact on logo entrance
    setTimeout(() => playImpact(), 150);

    // At 1.5s: Letters EMERGE from logo center position, logo simultaneously morphs to N
    setTimeout(() => {
      playWhoosh();

      // Ghost watermark: logo stays center, scales up + fades to subtle bg
      logoGhost.style.opacity = '0.7';
      logoGhost.style.animation = 'ghostExpand 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards';

      const logoRect = logo.getBoundingClientRect();
      const logoCX = logoRect.left + logoRect.width / 2;
      const logoCY = logoRect.top + logoRect.height / 2;

      // Animate each letter: start from logo center, fly to its natural position
      letterWraps.forEach((wrap, i) => {
        const letterEl = wrap.querySelector('.letter');
        const letterRect = wrap.getBoundingClientRect();
        const letterCX = letterRect.left + letterRect.width / 2;
        const letterCY = letterRect.top + letterRect.height / 2;

        // Offset FROM logo center TO natural position
        const offsetX = logoCX - letterCX;
        const offsetY = logoCY - letterCY;

        // Staggered timing — closer letters emerge first
        const delay = i * 50;
        const duration = 900;

        letterEl.animate([
          {
            transform: `translate(${offsetX}px, ${offsetY}px) scale(0.3)`,
            opacity: 0,
            filter: 'blur(3px)',
          },
          {
            transform: `translate(${offsetX * 0.1}px, ${offsetY * 0.1}px) scale(1.02)`,
            opacity: 0.8,
            filter: 'blur(0px)',
            offset: 0.7,
          },
          {
            transform: 'translate(0, 0) scale(1)',
            opacity: 1,
            filter: 'blur(0px)',
          }
        ], {
          duration: duration,
          delay: delay,
          easing: 'cubic-bezier(0.16, 1, 0.3, 1)',
          fill: 'forwards',
        });
      });

      // SIMULTANEOUSLY: Logo morphs to N position
      const nRect = nSlot.getBoundingClientRect();
      const oLetter = letterWraps[0]; // "O" — reference for cap height
      const oRect = oLetter.getBoundingClientRect();

      const nCenterX = nRect.left + nRect.width / 2;
      const oCenterY = oRect.top + oRect.height / 2;

      const dx = nCenterX - logoCX;
      const dy = oCenterY - logoCY;

      // Logo fills the full cap height of the letters
      const targetSize = oRect.height * 1.5;
      const scaleFactor = targetSize / logoRect.width;

      logo.animate([
        {
          transform: 'scale(1) translate(0, 0)',
          opacity: 1,
          offset: 0,
        },
        {
          // Slight pause at 30% — breathing moment
          transform: `scale(${scaleFactor * 1.8}) translate(${dx * 0.15 / (scaleFactor * 1.8)}px, ${dy * 0.15 / (scaleFactor * 1.8)}px)`,
          opacity: 0.7,
          offset: 0.3,
        },
        {
          // Accelerate to final position
          transform: `scale(${scaleFactor}) translate(${dx / scaleFactor}px, ${(dy - 3) / scaleFactor}px)`,
          opacity: 1,
          offset: 1,
        }
      ], {
        duration: 1100,
        easing: 'cubic-bezier(0.16, 1, 0.3, 1)',
        fill: 'forwards',
      });

      // Lock-in chime + flash at 1s
      setTimeout(() => {
        playChime();
        lockFlash.style.left = nCenterX + 'px';
        lockFlash.style.top = (oRect.top + oRect.height / 2) + 'px';
        lockFlash.style.transform = 'translate(-50%, -50%)';
        lockFlash.classList.add('active');
      }, 950);

      // Settle sound
      setTimeout(() => playSettle(), 1200);

    }, 1500);
  </script>
</body>
</html>
